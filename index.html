<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Contato</title>
    <link rel="stylesheet" href="contato.css">
</head>
<body>

    <section class="container-contato">
        <h2>Entre em Contato</h2>
        
        <form action="#" method="POST" class="form-contato">
            
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="assunto">Assunto:</label>
                <select id="assunto" name="assunto" required>
                    <option value="" disabled selected>Selecione um assunto</option>
                    <option value="suporte">Preciso de ajuda</option>
                    <option value="vendas">Comercial</option>
                    <option value="feedback">Feedback</option>
                    <option value="outros">Outros Assuntos</option>
                </select>
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?" required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Mensagem</button>

        </form>
    </section>

</body>
</html>
